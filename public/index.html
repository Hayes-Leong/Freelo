<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freelo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: { 'toast-in': 'slideIn 0.35s ease-out', 'toast-out': 'slideOut 0.3s ease-in forwards', 'fade-in': 'fadeIn 0.2s ease-out' },
          keyframes: { slideIn: { '0%': { opacity: '0', transform: 'translateX(60px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } }, slideOut: { '0%': { opacity: '1', transform: 'translateX(0)' }, '100%': { opacity: '0', transform: 'translateX(60px)' } }, fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } } }
        }
      }
    }
  </script>
  <style>
    html { font-size: clamp(14px, 1.15vw, 18px); }
    .cal-cell { min-height: 90px; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-blue-50 h-screen overflow-hidden flex flex-col">

  <!-- Toast -->
  <div id="toastContainer" class="fixed bottom-6 right-6 z-[100] flex flex-col-reverse gap-3" style="max-width:360px"></div>

  <!-- 确认对话框 -->
  <div id="confirmModal" class="hidden fixed inset-0 bg-black bg-opacity-30 z-[90] flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-80 shadow-2xl animate-toast-in">
      <p id="confirmMsg" class="text-base text-gray-700 mb-5"></p>
      <div class="flex gap-3 justify-end">
        <button id="confirmNo" class="px-5 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
        <button id="confirmYes" class="px-5 py-2 text-sm bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 shadow-sm transition-colors">确定</button>
      </div>
    </div>
  </div>

  <!-- 顶部栏 -->
  <header class="bg-white/80 backdrop-blur shadow-sm border-b border-indigo-100 px-6 py-3 flex items-center justify-between flex-shrink-0">
    <h1 class="text-xl font-bold text-indigo-900 tracking-tight">📅 Freelo OKR日程管理器</h1>
    <div class="flex items-center gap-2">
      <button id="prevMonth" class="px-3 py-1.5 rounded-lg hover:bg-indigo-50 text-lg transition-colors">&lt;</button>
      <span id="monthLabel" class="text-base font-semibold text-gray-700 w-32 text-center"></span>
      <button id="nextMonth" class="px-3 py-1.5 rounded-lg hover:bg-indigo-50 text-lg transition-colors">&gt;</button>
    </div>
  </header>

  <!-- 三栏主体 -->
  <div class="flex flex-1 overflow-hidden">

    <!-- 左栏 -->
    <aside class="bg-white border-r border-gray-100 flex-shrink-0 p-4 overflow-y-auto" style="width:20%">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-base font-bold text-gray-700">OKR 目标</h2>
        <button id="addOkrBtn" class="px-2 py-1 text-sm text-indigo-600 hover:bg-indigo-50 rounded-lg font-semibold transition-colors">+ 添加</button>
      </div>
      <div id="okrList"></div>
      <!-- 弹窗 -->
      <div id="okrModal" class="hidden fixed inset-0 bg-black bg-opacity-30 z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl p-5 w-80 shadow-2xl animate-toast-in">
          <h3 class="text-base font-bold mb-4">添加 OKR</h3>
          <select id="okrLevel" class="w-full border rounded-lg px-3 py-2 text-sm mb-3 focus:ring-2 focus:ring-indigo-300 focus:outline-none">
            <option value="quarter">季度</option><option value="month">月度</option><option value="week">周度</option>
          </select>
          <div id="okrExtraFields"></div>
          <input id="okrTitle" type="text" placeholder="目标标题" class="w-full border rounded-lg px-3 py-2 text-sm mb-4 focus:ring-2 focus:ring-indigo-300 focus:outline-none">
          <div class="flex gap-3 justify-end">
            <button id="okrCancelBtn" class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">取消</button>
            <button id="okrSaveBtn" class="px-4 py-2 text-sm bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 shadow-sm transition-colors">保存</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- 中栏 -->
    <section class="flex-1 p-3 overflow-y-auto">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 h-full flex flex-col overflow-hidden">
        <div class="grid grid-cols-7 text-center text-sm font-semibold text-gray-500 border-b border-gray-100 py-2.5 bg-gray-50/50">
          <div class="text-red-400">日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div class="text-indigo-400">六</div>
        </div>
        <div id="calendarGrid" class="grid grid-cols-7 flex-1"></div>
      </div>
    </section>

    <!-- 右栏 -->
    <aside class="bg-white border-l border-gray-100 flex-shrink-0 p-4 overflow-y-auto" style="width:20%">
      <h2 class="text-base font-bold text-gray-700 mb-3">日期详情</h2>
      <p id="selectedDateLabel" class="text-sm text-gray-400 mb-4">请在日历中点击日期</p>

      <div class="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-xl p-4 mb-4 border border-indigo-100">
        <div class="text-sm text-gray-500 mb-1">休息奖池</div>
        <div class="text-3xl font-bold text-indigo-600"><span id="balanceDisplay">--</span> <span class="text-lg text-gray-400">天</span></div>
      </div>

      <h3 class="text-base font-bold text-gray-700 mb-2">今日待办</h3>
      <ul id="todoList" class="space-y-1.5 mb-3"></ul>

      <div class="flex gap-2 mb-4">
        <input id="todoInput" type="text" placeholder="新待办..." disabled
          class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition-shadow">
        <button id="addTodoBtn" disabled class="px-4 py-2 bg-indigo-500 text-white rounded-lg text-sm hover:bg-indigo-600 transition-colors shadow-sm disabled:opacity-50">+</button>
      </div>

      <button id="checkinBtn" disabled class="w-full py-2.5 bg-gray-200 text-gray-500 rounded-lg text-sm font-semibold cursor-not-allowed transition-all">请选择日期</button>
      <button id="restDayBtn" class="w-full py-2.5 mt-2 bg-amber-50 text-amber-700 rounded-lg text-sm font-semibold hover:bg-amber-100 border border-amber-200 hidden transition-all">切为休息日（消耗1天）</button>

      <!-- 灵感代办看板 -->
      <h3 class="text-base font-bold text-gray-700 mt-6 mb-2">💡 代办看板</h3>
      <div class="flex gap-2 mb-3">
        <input id="ideaInput" type="text" placeholder="添加灵感事项..."
          class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition-shadow">
        <button id="addIdeaBtn" class="px-4 py-2 bg-indigo-500 text-white rounded-lg text-sm hover:bg-indigo-600 transition-colors shadow-sm">+</button>
      </div>
      <ul id="ideaList" class="space-y-1.5 text-sm"></ul>
    </aside>

  </div>

<script>
// ---- Toast ----
function toast(msg, type) {
  type = type || 'info';
  const colors = { info: 'bg-gray-800 text-white', success: 'bg-emerald-600 text-white', error: 'bg-red-500 text-white', warn: 'bg-amber-500 text-white' };
  const icons = { info: '', success: '✅ ', error: '❌ ', warn: '⚠️ ' };
  const el = document.createElement('div');
  el.className = colors[type] + ' px-5 py-3 rounded-xl shadow-xl text-base font-medium animate-toast-in flex items-center gap-3 whitespace-nowrap';
  el.innerHTML = '<span class="text-lg flex-shrink-0">' + icons[type] + '</span><span>' + msg + '</span>';
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(function () { el.classList.add('animate-toast-out'); setTimeout(function () { el.remove(); }, 300); }, 3000);
}

// ---- 确认对话框 ----
function confirmDialog(msg) {
  return new Promise(function (resolve) {
    document.getElementById('confirmMsg').textContent = msg;
    var modal = document.getElementById('confirmModal');
    modal.classList.remove('hidden');
    function cleanup() { modal.classList.add('hidden'); document.getElementById('confirmYes').removeEventListener('click', onYes); document.getElementById('confirmNo').removeEventListener('click', onNo); }
    function onYes() { cleanup(); resolve(true); }
    function onNo() { cleanup(); resolve(false); }
    document.getElementById('confirmYes').addEventListener('click', onYes);
    document.getElementById('confirmNo').addEventListener('click', onNo);
  });
}

// ---- 状态 ----
const state = { currentMonth: '', selectedDate: null, balance: 0 };

// ---- 初始化 ----
document.getElementById('prevMonth').addEventListener('click', () => changeMonth(-1));
document.getElementById('nextMonth').addEventListener('click', () => changeMonth(1));
document.getElementById('calendarGrid').addEventListener('click', (e) => {
  const cell = e.target.closest('[data-date]');
  if (cell) selectDate(cell.dataset.date);
});
document.getElementById('addTodoBtn').addEventListener('click', addTodo);
document.getElementById('todoInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addTodo(); });
document.getElementById('checkinBtn').addEventListener('click', doCheckin);
document.getElementById('restDayBtn').addEventListener('click', toggleRestDay);
document.getElementById('addOkrBtn').addEventListener('click', showOkrModal);
document.getElementById('okrCancelBtn').addEventListener('click', hideOkrModal);
document.getElementById('okrSaveBtn').addEventListener('click', saveOkr);
document.getElementById('okrList').addEventListener('click', (e) => {
  const delBtn = e.target.closest('.okr-delete');
  if (delBtn) { confirmDialog('确定删除此 OKR 及其子 OKR 和关键结果？').then(function(ok) { if (ok) deleteOkr(Number(delBtn.dataset.id)); }); }
});
document.getElementById('addIdeaBtn').addEventListener('click', addIdea);
document.getElementById('ideaInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') addIdea(); });
document.getElementById('ideaList').addEventListener('click', function(e) {
  var delBtn = e.target.closest('.idea-delete');
  if (delBtn) deleteIdea(Number(delBtn.dataset.id));
});

const now = new Date();
state.currentMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
loadCalendar(); loadBalance(); loadOkrs(); loadIdeas();

// ---- 余额 ----
function loadBalance() {
  fetch('/api/reward/balance').then((r) => r.json()).then((d) => { state.balance = d.balance; document.getElementById('balanceDisplay').textContent = d.balance; }).catch((err) => console.error(err));
}

// ---- 月份 ----
function changeMonth(delta) {
  const [y, m] = state.currentMonth.split('-').map(Number);
  state.currentMonth = new Date(y, m - 1 + delta, 1).getFullYear() + '-' + String(new Date(y, m - 1 + delta, 1).getMonth() + 1).padStart(2, '0');
  state.selectedDate = null; loadCalendar(); loadOkrs(); resetRightPanel();
}

// ---- 日历 ----
function loadCalendar() {
  const [y, m] = state.currentMonth.split('-');
  document.getElementById('monthLabel').textContent = y + '年' + m + '月';
  fetch('/api/calendar?month=' + state.currentMonth).then((r) => r.json()).then(renderCalendar).catch((err) => console.error(err));
}

function renderCalendar(data) {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  data.days.forEach((day) => {
    const cell = document.createElement('div');
    cell.dataset.date = day.date;
    cell.className = 'cal-cell border-b border-r border-gray-100 p-1.5 cursor-pointer transition-all hover:shadow-md hover:z-10 relative';
    cell.style.minHeight = '90px';

    // 背景
    if (day.is_padding) { cell.classList.add('bg-gray-50/50'); }
    else if (day.checkin_done) { cell.classList.add('bg-emerald-50/70'); }
    else if (!day.is_workday) { cell.classList.add('bg-gray-100/70'); }
    else { cell.classList.add('bg-amber-50/40'); }

    if (day.date === state.selectedDate) { cell.classList.add('ring-2', 'ring-indigo-400', 'ring-inset', 'rounded'); }

    // === 右上角：日期数字 ===
    const dateNum = document.createElement('div');
    dateNum.className = 'text-right leading-none mb-1';
    const isToday = day.date === new Date().toISOString().slice(0, 10);
    if (day.is_padding) {
      dateNum.innerHTML = '<span class="text-lg text-gray-300">' + new Date(day.date+'T00:00:00').getDate() + '</span>';
    } else if (isToday) {
      dateNum.innerHTML = '<span class="inline-block bg-indigo-500 text-white rounded-full w-7 h-7 text-center text-lg font-black leading-7">' + new Date(day.date+'T00:00:00').getDate() + '</span>';
    } else {
      dateNum.innerHTML = '<span class="text-xl font-black text-gray-800">' + new Date(day.date+'T00:00:00').getDate() + '</span>';
    }
    cell.appendChild(dateNum);

    if (!day.is_padding) {
      // 状态图标
      let icon = '';
      if (!day.is_workday) icon = '☕';
      else if (day.checkin_done) icon = '✅';
      if (icon) {
        const iconEl = document.createElement('div');
        iconEl.className = 'absolute top-1 left-1 text-sm'; iconEl.textContent = icon;
        cell.appendChild(iconEl);
      }

      // 节日/节气
      if (day.annotation) {
        const anno = document.createElement('div');
        anno.className = 'text-right truncate leading-tight font-bold mb-1.5';
        const c = day.annotation.type === 'holiday' ? '#e53e3e' : '#2563eb';
        anno.innerHTML = '<span style="font-size:0.8rem;color:' + c + '">' + day.annotation.emoji + ' ' + day.annotation.name + '</span>';
        cell.appendChild(anno);
      }

      // 待办列表
      if (day.todos && day.todos.length > 0) {
        const coreTasks = day.todos.filter((t) => t.is_core);
        const otherTasks = day.todos.filter((t) => !t.is_core);

        // 核心任务
        coreTasks.forEach((todo) => {
          const el = document.createElement('div');
          el.className = 'truncate leading-tight font-bold mt-1';
          el.style.fontSize = '0.8rem'; el.style.color = '#4338ca';
          el.textContent = '★ ' + todo.content;
          cell.appendChild(el);
        });

        // 其他待办
        otherTasks.forEach((todo) => {
          const el = document.createElement('div');
          el.className = 'truncate leading-tight text-gray-500 mt-0.5';
          el.style.fontSize = '0.72rem';
          el.textContent = '- ' + todo.content;
          cell.appendChild(el);
        });
      }
    }

    grid.appendChild(cell);
  });
}

// ---- 右栏 ----
function resetRightPanel() {
  document.getElementById('selectedDateLabel').textContent = '请在日历中点击日期';
  document.getElementById('todoList').innerHTML = '<p class="text-sm text-gray-400">请选择日期</p>';
  document.getElementById('todoInput').disabled = true; document.getElementById('addTodoBtn').disabled = true;
  document.getElementById('checkinBtn').disabled = true; document.getElementById('checkinBtn').textContent = '请选择日期';
  document.getElementById('checkinBtn').className = 'w-full py-2.5 bg-gray-200 text-gray-500 rounded-lg text-sm font-semibold cursor-not-allowed transition-all';
  document.getElementById('restDayBtn').classList.add('hidden');
}

function selectDate(date) { state.selectedDate = date; document.getElementById('selectedDateLabel').textContent = '已选中：' + date; loadCalendar(); loadTodos(date); }

function updateCheckinState(todos, dayInfo) {
  const btn = document.getElementById('checkinBtn'); const restBtn = document.getElementById('restDayBtn');
  const today = new Date().toISOString().slice(0, 10);
  if (!dayInfo) { btn.disabled = true; btn.textContent = '请选择日期'; btn.className = 'w-full py-2.5 bg-gray-200 text-gray-500 rounded-lg text-sm font-semibold cursor-not-allowed transition-all'; restBtn.classList.add('hidden'); return; }
  if (dayInfo.date > today) { btn.disabled = true; btn.textContent = '未来日期不可打卡'; btn.className = 'w-full py-2.5 bg-gray-100 text-gray-400 rounded-lg text-sm font-semibold cursor-not-allowed transition-all'; }
  else if (dayInfo.checkin_done) { btn.disabled = true; btn.textContent = '已打卡 ✅'; btn.className = 'w-full py-2.5 bg-emerald-100 text-emerald-700 rounded-lg text-sm font-semibold cursor-not-allowed transition-all'; }
  else if (!dayInfo.is_workday) { btn.disabled = true; btn.textContent = '休息日无需打卡 ☕'; btn.className = 'w-full py-2.5 bg-gray-100 text-gray-500 rounded-lg text-sm font-semibold cursor-not-allowed transition-all'; }
  else if (!todos.some((t) => t.is_core === 1 && t.completed === 1)) { btn.disabled = true; btn.textContent = '打卡（请先完成核心任务）'; btn.className = 'w-full py-2.5 bg-amber-100 text-amber-700 rounded-lg text-sm font-semibold cursor-not-allowed transition-all'; }
  else { btn.disabled = false; btn.textContent = '✅ 打卡'; btn.className = 'w-full py-2.5 bg-indigo-500 text-white rounded-lg text-sm font-semibold hover:bg-indigo-600 shadow-sm cursor-pointer transition-all'; }
  if (dayInfo && !dayInfo.checkin_done) { restBtn.classList.remove('hidden');
    if (!dayInfo.is_workday) { restBtn.textContent = '切回工作日'; restBtn.className = 'w-full py-2.5 mt-2 bg-emerald-50 text-emerald-700 rounded-lg text-sm font-semibold hover:bg-emerald-100 border border-emerald-200 transition-all'; }
    else { restBtn.textContent = '切为休息日（消耗1天）'; restBtn.className = 'w-full py-2.5 mt-2 bg-amber-50 text-amber-700 rounded-lg text-sm font-semibold hover:bg-amber-100 border border-amber-200 transition-all'; }
  } else { restBtn.classList.add('hidden'); }
}

// ---- 待办 ----
function loadTodos(date) {
  document.getElementById('todoInput').disabled = false; document.getElementById('addTodoBtn').disabled = false; document.getElementById('todoInput').value = '';
  Promise.all([fetch('/api/todos?date='+date).then((r)=>r.json()), fetch('/api/calendar?month='+state.currentMonth).then((r)=>r.json())])
    .then(([todoData, calData]) => {
      const todos = todoData.todos; const dayInfo = calData.days.find((d) => d.date === date) || null;
      const list = document.getElementById('todoList'); list.innerHTML = '';
      if (todos.length === 0) list.innerHTML = '<p class="text-sm text-gray-400">暂无待办</p>';
      todos.forEach((todo) => {
        const li = document.createElement('li'); li.className = 'flex items-center gap-2 text-sm py-1.5 px-2 rounded-lg hover:bg-gray-50 group transition-colors';
        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = todo.completed === 1; cb.className = 'w-4 h-4 accent-indigo-500';
        cb.addEventListener('change', () => toggleComplete(todo.id, cb.checked)); li.appendChild(cb);
        const span = document.createElement('span'); span.className = 'flex-1 truncate'; span.textContent = todo.content;
        if (todo.completed) span.classList.add('line-through', 'text-gray-400');
        if (todo.is_core) span.classList.add('font-bold', 'text-indigo-700');
        li.appendChild(span);
        if (!todo.is_core) { const b = document.createElement('button'); b.className = 'text-gray-300 hover:text-yellow-500 invisible group-hover:visible text-sm'; b.textContent = '⭐'; b.title = '设为核心'; b.addEventListener('click', () => setCore(todo.id)); li.appendChild(b); }
        else { const b = document.createElement('span'); b.className = 'text-yellow-500 text-sm'; b.textContent = '⭐'; b.title = '当前核心'; li.appendChild(b); }
        const del = document.createElement('button'); del.className = 'text-gray-300 hover:text-red-500 invisible group-hover:visible text-sm'; del.textContent = '✕'; del.title = '删除'; del.addEventListener('click', () => deleteTodo(todo.id)); li.appendChild(del);
        list.appendChild(li);
      });
      updateCheckinState(todos, dayInfo);
    }).catch((err) => console.error(err));
}

function addTodo() { const input = document.getElementById('todoInput'); const c = input.value.trim(); if (!c||!state.selectedDate) return;
  fetch('/api/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date:state.selectedDate,content:c,is_core:0})}).then(()=>{input.value='';loadTodos(state.selectedDate);loadCalendar();}).catch((e)=>console.error(e)); }
function toggleComplete(id,completed) { fetch('/api/todos/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({completed:completed?1:0})}).then(()=>{loadTodos(state.selectedDate);loadCalendar();}).catch((e)=>console.error(e)); }
function setCore(id) { fetch('/api/todos/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({is_core:1})}).then(()=>{loadTodos(state.selectedDate);loadCalendar();}).catch((e)=>console.error(e)); }
function deleteTodo(id) { fetch('/api/todos/'+id,{method:'DELETE'}).then(()=>{loadTodos(state.selectedDate);loadCalendar();}).catch((e)=>console.error(e)); }

// ---- 打卡 ----
function doCheckin() { if(!state.selectedDate)return;
  fetch('/api/checkin/'+state.selectedDate,{method:'POST'}).then((r)=>r.json()).then((d)=>{if(d.error){toast(d.error,'error');return;}loadBalance();loadCalendar();loadTodos(state.selectedDate);toast('打卡成功！+0.5 天','success');}).catch(()=>toast('打卡失败','error')); }

// ---- 休息日 ----
async function toggleRestDay() { if(!state.selectedDate)return; try {
  const calRes=await fetch('/api/calendar?month='+state.currentMonth); const calData=await calRes.json();
  const dayInfo=calData.days.find((d)=>d.date===state.selectedDate); if(!dayInfo)return; const isWorkday=dayInfo.is_workday;
  if(isWorkday){if(state.balance<1){toast('余额不足（当前 '+state.balance+' 天，需要 1 天）','warn');return;}const ok=await confirmDialog('设为休息日将消耗 1 天余额，当前余额 '+state.balance+' 天。确定？');if(!ok)return;}
  const res=await fetch('/api/calendar/'+state.selectedDate,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({is_workday:isWorkday?0:1})});
  const d=await res.json(); if(d.error){toast(d.error,'error');return;} toast(isWorkday?'已设为休息日 ☕':'已恢复工作日','success'); loadBalance();loadCalendar();loadTodos(state.selectedDate);
} catch(err) { toast('操作失败','error'); } }

// ---- OKR ----
let okrCache = null;
function loadOkrs() { fetch('/api/okrs?month='+state.currentMonth).then((r)=>r.json()).then((d)=>{okrCache=d;renderOkrTree(d);}).catch((e)=>console.error(e)); }

function renderOkrTree(data) {
  const container = document.getElementById('okrList'); let html = '';
  html += '<div class="text-sm font-bold text-indigo-600 mb-3 pb-2 border-b-2 border-indigo-100">📅 ' + escapeHtml(data.quarterLabel) + '</div>';
  // 季度 OKR
  (data.quarters || []).forEach((q) => { html += '<div class="mb-2 ml-1">' + okrItemHtml(q,'quarter') + krListHtml(q.krs||[],q.id) + '</div>'; });
  if (!data.quarters || data.quarters.length === 0) html += '<p class="text-sm text-gray-300 ml-1 mb-3">暂无季度 OKR</p>';
  html += '<div class="border-t border-gray-100 my-2"></div>';
  // 月份
  (data.months || []).forEach((mo) => {
    const hasContent = mo.okrs.length > 0; const isCurrentMonth = mo.month === (new Date().getMonth()+1);
    const collapsed = !hasContent && !isCurrentMonth; const mId = 'm-' + mo.month;
    html += '<div class="ml-1 mb-2">';
    html += '<div class="flex items-center gap-1.5 cursor-pointer text-sm py-1 hover:bg-gray-50 rounded-lg px-1 transition-colors" onclick="document.getElementById(\''+mId+'\').classList.toggle(\'hidden\')">';
    html += '<span class="text-gray-400 w-4 flex-shrink-0 font-bold">'+(collapsed?'▸':'▾')+'</span>';
    html += '<span class="font-semibold text-gray-700">📆 ' + escapeHtml(mo.label) + '</span>';
    if (!hasContent) html += '<span class="text-gray-300 font-normal"> (暂无)</span>';
    html += '</div>';
    html += '<div id="'+mId+'" class="ml-4'+(collapsed?' hidden':'')+'">';
    mo.okrs.forEach((mOkr) => {
      html += okrItemHtml(mOkr,'month') + krListHtml(mOkr.krs||[],mOkr.id);
      (mOkr.weeks||[]).forEach((wOkr) => {
        html += '<div class="ml-3 border-l-2 border-indigo-200 pl-3 mb-2">';
        html += '<div class="text-sm text-gray-400 mb-0.5">📋 ' + fmtWeek(wOkr.start_date,wOkr.end_date) + '</div>';
        html += okrItemHtml(wOkr,'week') + krListHtml(wOkr.krs||[],wOkr.id) + '</div>';
      });
    });
    html += '</div></div>';
  });
  container.innerHTML = html; bindOkrEvents(container);
}

function fmtWeek(s,e) { return (new Date(s+'T00:00:00').getMonth()+1)+'/'+new Date(s+'T00:00:00').getDate()+'-'+(new Date(e+'T00:00:00').getMonth()+1)+'/'+new Date(e+'T00:00:00').getDate(); }

function okrItemHtml(o, level) {
  let h = '<div class="flex items-center gap-1 py-1 hover:bg-gray-50 rounded-lg px-1 group text-sm">';
  h += '<span class="truncate text-gray-800 flex-1">' + escapeHtml(o.title) + '</span>';
  h += '<button class="okr-delete text-gray-300 hover:text-red-500 invisible group-hover:visible flex-shrink-0 text-sm" data-id="'+o.id+'">✕</button>';
  h += '</div>'; return h;
}

function krListHtml(krs, okrId) {
  let h = '';
  (krs||[]).forEach((kr) => {
    const c = kr.completed?'checked':''; const cl = kr.completed?'line-through text-gray-400':'text-gray-600';
    h += '<div class="ml-4 flex items-center gap-2 text-sm py-0.5 group">' +
      '<input type="checkbox" class="kr-toggle w-3.5 h-3.5 accent-indigo-500" data-id="'+kr.id+'" '+c+'>' +
      '<span class="flex-1 truncate '+cl+'">'+escapeHtml(kr.content)+'</span>' +
      '<button class="kr-delete text-gray-300 hover:text-red-500 invisible group-hover:visible text-sm" data-id="'+kr.id+'">✕</button></div>';
  });
  h += '<div class="ml-4 flex items-center gap-1 mb-1"><input type="text" class="kr-add-input flex-1 border rounded-lg px-2 py-0.5 text-sm" placeholder="添加关键结果..."><button class="kr-add-btn text-indigo-400 hover:text-indigo-600 text-sm font-semibold" data-okr="'+okrId+'">+</button></div>';
  return h;
}

function bindOkrEvents(container) {
  container.querySelectorAll('.okr-delete').forEach((btn) => { btn.addEventListener('click',(e)=>{e.stopPropagation();confirmDialog('确定删除此 OKR 及其子 OKR 和关键结果？').then(function(ok){if(ok)deleteOkr(Number(btn.dataset.id));});});});
  container.querySelectorAll('.kr-toggle').forEach((cb) => { cb.addEventListener('change',function(){toggleKr(Number(this.dataset.id),this.checked);}); });
  container.querySelectorAll('.kr-delete').forEach((btn) => { btn.addEventListener('click',(e)=>{e.stopPropagation();deleteKr(Number(btn.dataset.id));}); });
  container.querySelectorAll('.kr-add-btn').forEach((btn) => { btn.addEventListener('click',function(){const inp=this.parentElement.querySelector('.kr-add-input');if(inp.value.trim())addKr(Number(this.dataset.okr),inp.value.trim());});});
  container.querySelectorAll('.kr-add-input').forEach((inp) => { inp.addEventListener('keydown',function(e){if(e.key==='Enter')this.parentElement.querySelector('.kr-add-btn').click();}); });
}

function escapeHtml(str) { const d=document.createElement('div'); d.textContent=str||''; return d.innerHTML; }

// ---- 弹窗 ----
function showOkrModal() {
  document.getElementById('okrModal').classList.remove('hidden'); const levelSel=document.getElementById('okrLevel'),extraDiv=document.getElementById('okrExtraFields');
  function updateExtra() { const lv=levelSel.value; let h='';
    if(lv==='month'&&okrCache){h='<select id="okrMonth" class="w-full border rounded-lg px-3 py-2 text-sm mb-3 focus:ring-2 focus:ring-indigo-300 focus:outline-none">';(okrCache.months||[]).forEach((mo)=>{h+='<option value="'+mo.start+'">'+escapeHtml(mo.label)+'</option>';});h+='</select>';}
    else if(lv==='week'&&okrCache){h='<select id="okrWeekMonth" class="w-full border rounded-lg px-3 py-2 text-sm mb-3 focus:ring-2 focus:ring-indigo-300 focus:outline-none">';(okrCache.months||[]).forEach((mo)=>{h+='<option value="'+mo.start+'">'+escapeHtml(mo.label)+'</option>';});h+='</select>';
      h+='<select id="okrWeekParent" class="w-full border rounded-lg px-3 py-2 text-sm mb-3 focus:ring-2 focus:ring-indigo-300 focus:outline-none"><option value="">父级月度 OKR</option></select>';
      h+='<select id="okrWeekRange" class="w-full border rounded-lg px-3 py-2 text-sm mb-3 focus:ring-2 focus:ring-indigo-300 focus:outline-none"><option value="">选择周范围</option></select>';}
    extraDiv.innerHTML=h;
    if(lv==='week'){const wm=document.getElementById('okrWeekMonth'),wp=document.getElementById('okrWeekParent'),wr=document.getElementById('okrWeekRange');
      function refresh(){const mo=(okrCache.months||[]).find((m)=>m.start===wm.value);if(wp){wp.innerHTML='<option value="">父级月度 OKR</option>';if(mo)mo.okrs.forEach((o)=>{wp.innerHTML+='<option value="'+o.id+'">'+escapeHtml(o.title)+'</option>';});}if(wr){wr.innerHTML='<option value="">选择周范围</option>';if(mo)(mo.weeks||[]).forEach((w)=>{wr.innerHTML+='<option value="'+w.start+'|'+w.end+'">'+w.label+'</option>';});}}if(wm)wm.onchange=refresh;refresh();}}
  levelSel.onchange=updateExtra; updateExtra(); document.getElementById('okrTitle').focus();
}
function hideOkrModal() { document.getElementById('okrModal').classList.add('hidden'); document.getElementById('okrTitle').value=''; document.getElementById('okrLevel').value='quarter'; document.getElementById('okrExtraFields').innerHTML=''; }
function saveOkr() { const lv=document.getElementById('okrLevel').value,t=document.getElementById('okrTitle').value.trim(); if(!t){toast('请填写标题','warn');return;} const body={level:lv,title:t,month:state.currentMonth};
  if(lv==='month'){const mm=document.getElementById('okrMonth');if(mm)body.month=mm.value;}
  if(lv==='week'){const wp=document.getElementById('okrWeekParent'),wr=document.getElementById('okrWeekRange');if(wp&&wp.value)body.parent_id=Number(wp.value);if(wr&&wr.value){const[ws,we]=wr.value.split('|');body.weekStart=ws;body.weekEnd=we;}if(!body.weekStart){toast('请选择周范围','warn');return;}}
  fetch('/api/okrs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(()=>{hideOkrModal();loadOkrs();}).catch((e)=>console.error(e)); }
function deleteOkr(id) { fetch('/api/okrs/'+id,{method:'DELETE'}).then(()=>loadOkrs()).catch((e)=>console.error(e)); }
function addKr(okrId,c) { fetch('/api/okrs/'+okrId+'/krs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c})}).then(()=>loadOkrs()).catch((e)=>console.error(e)); }
function toggleKr(id,completed) { fetch('/api/okrs/krs/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({completed:completed?1:0})}).then(()=>loadOkrs()).catch((e)=>console.error(e)); }
function deleteKr(id) { fetch('/api/okrs/krs/'+id,{method:'DELETE'}).then(()=>loadOkrs()).catch((e)=>console.error(e)); }

// ---- 灵感代办看板 ----
function loadIdeas() {
  fetch('/api/ideas').then(function(r) { return r.json(); }).then(function(d) {
    var list = document.getElementById('ideaList');
    list.innerHTML = '';
    if (!d.ideas || d.ideas.length === 0) {
      list.innerHTML = '<p class="text-sm text-gray-400">暂无灵感事项</p>';
      return;
    }
    d.ideas.forEach(function(idea) {
      var li = document.createElement('li');
      li.className = 'flex items-center gap-2 py-1.5 px-2 rounded-lg hover:bg-gray-50 group transition-colors';
      var span = document.createElement('span');
      span.className = 'flex-1 truncate';
      span.textContent = idea.content;
      li.appendChild(span);
      var del = document.createElement('button');
      del.className = 'idea-delete text-gray-300 hover:text-red-500 invisible group-hover:visible text-sm';
      del.textContent = '✕';
      del.title = '删除';
      del.dataset.id = idea.id;
      li.appendChild(del);
      list.appendChild(li);
    });
  }).catch(function(err) { console.error(err); });
}

function addIdea() {
  var input = document.getElementById('ideaInput');
  var content = input.value.trim();
  if (!content) return;
  fetch('/api/ideas', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: content })
  }).then(function() {
    input.value = '';
    loadIdeas();
  }).catch(function(e) { console.error(e); });
}

function deleteIdea(id) {
  fetch('/api/ideas/' + id, { method: 'DELETE' }).then(function() {
    loadIdeas();
  }).catch(function(e) { console.error(e); });
}
</script>
